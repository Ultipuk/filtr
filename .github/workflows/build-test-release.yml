name: Build, Test & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APP_NAME: filter

permissions:
  contents: read

jobs:
  ci_native:
    name: CI (Native)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check
        run: cargo check --all-targets

      - name: Test
        run: cargo test --lib

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Fmt
        run: cargo fmt --all -- --check

  ci_wasm:
    name: CI (WASM)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust + wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Check wasm
        run: cargo check --lib --target wasm32-unknown-unknown

      - name: Install Trunk
        run: cargo install --locked trunk

      - name: Trunk build
        run: trunk build --release

  release_build:
    name: Release Build (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ci_native, ci_wasm]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: .exe
          - os: windows-latest
            target: i686-pc-windows-msvc
            ext: .exe
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $asset = "${{ env.APP_NAME }}-${{ github.ref_name }}-${{ matrix.target }}.zip"
          $binary = "target/${{ matrix.target }}/release/${{ env.APP_NAME }}${{ matrix.ext }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path $binary -DestinationPath "dist/$asset" -Force

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          asset="${APP_NAME}-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          binary="target/${{ matrix.target }}/release/${APP_NAME}${{ matrix.ext }}"
          mkdir -p dist
          tar -czf "dist/$asset" -C "$(dirname "$binary")" "$(basename "$binary")"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: dist/*

  release_publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release_build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
